name: Publish Package to npmjs

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Version Alignment
        run: |
          # 获取推送的 Tag（如 v1.0.25）并去除开头的 'v'
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # 从 package.json 中提取版本号
          PKG_VERSION=$(node -p "require('./package.json').version")
          
          echo "Git Tag Version: $TAG_VERSION"
          echo "Package.json Version: $PKG_VERSION"
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch! Git Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Build and Prepare Package
        run: bun run build:pkg

      - name: Verify npm version
        run: |
          which npm
          npm --version

      - name: Publish to npm
        run: |
          cd pkg
          npm publish --provenance --access public
