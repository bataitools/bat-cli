name: Publish Package to npmjs

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify Version Alignment
        run: |
          # 获取推送的 Tag（如 v1.0.25）并去除开头的 'v'
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          # 从 package.json 中提取版本号
          PKG_VERSION=$(node -p "require('./package.json').version")
          
          echo "Git Tag Version: $TAG_VERSION"
          echo "Package.json Version: $PKG_VERSION"
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch! Git Tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Build and Prepare Package
        run: bun run build:pkg

      - name: Verify npm version
        run: |
          which npm
          npm --version

      - name: Publish to npm
        run: |
          cd pkg
          npx --package=npm@latest npm publish --provenance --access public

  package-skills:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Package skills as zip files
        run: |
          mkdir -p dist/skills
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            # Validate SKILL.md exists
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "⚠️  Skipping $skill_name — no SKILL.md found"
              continue
            fi
            zip_path="dist/skills/${skill_name}.zip"
            # Create zip with skill-name/ as root folder inside the archive
            (cd skills && zip -r "../$zip_path" "$skill_name/")
            echo "✅ Packaged: $zip_path"
          done

      - name: Upload skill zips to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          
          # Ensure the release exists
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG not found. Creating a new release..."
            gh release create "$TAG" --generate-notes
          fi
          
          # Upload files to the release
          for zip_file in dist/skills/*.zip; do
            [ -f "$zip_file" ] || continue
            echo "Uploading $zip_file to release $TAG"
            gh release upload "$TAG" "$zip_file" --clobber
          done
